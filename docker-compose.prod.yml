version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: konekin-app
    restart: always
    working_dir: /app
    environment:
      - APP_NAME=Konekin
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mongodb
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_DATABASE=konekin
    env_file:
      - .env.docker
    volumes:
      - ./storage:/app/storage:rw
      - ./bootstrap/cache:/app/bootstrap/cache:rw
    expose:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  mongodb:
    image: mongo:7.0-alpine
    container_name: konekin-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: konekin
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    expose:
      - "27017"
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  nginx-reverse-proxy:
    image: nginx:alpine
    container_name: konekin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-proxy/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  konekin-network:
    driver: bridge
