services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: konekin-app
    restart: always
    init: true
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mongodb
      DB_HOST: mongodb
      DB_PORT: "27017"
      DB_DATABASE: konekin
      ML_SERVICE_URL: http://ml-service:5000
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      AUTO_OPTIMIZE: "true"
      WAIT_FOR_DB: "true"
      QUEUE_WORKERS: ${QUEUE_WORKERS:-2}
    volumes:
      - app_storage:/app/storage
      - app_cache:/app/bootstrap/cache
    expose:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: konekin-ml-service
    restart: always
    init: true
    expose:
      - "5000"
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: konekin-mongodb
    restart: always
    user: "999:999"
    environment:
      MONGO_INITDB_DATABASE: konekin
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    expose:
      - "27017"
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' localhost:27017/test"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx-reverse-proxy:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    container_name: konekin-nginx
    restart: always
    init: true
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-proxy/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  app_storage:
  app_cache:
  mongodb_data:
  mongodb_config:

networks:
  konekin-network:
    driver: bridge
