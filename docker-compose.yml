version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: konekin-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_NAME=Konekin
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mongodb
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_DATABASE=konekin
    env_file:
      - .env.docker
    volumes:
      - ./storage:/app/storage:rw
      - ./bootstrap/cache:/app/bootstrap/cache:rw
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

  mongodb:
    image: mongo:7.0-alpine
    container_name: konekin-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: konekin
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    ports:
      - "27017:27017"
    networks:
      - konekin-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  konekin-network:
    driver: bridge
